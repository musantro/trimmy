[project]
name = "trimmy"
version = "0.2.0"
description = "Trimmy — vertical split crop video editor"
requires-python = ">=3.11"
dependencies = [
    "PySide6>=6.5",
    "typing_extensions>=4.0; python_version < '3.12'",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
trimmy = "trimmy.__main__:main"

[dependency-groups]
dev = [
    "commitizen>=4.16",
    "prek>=0.4",
    "ruff>=0.15",
    "ty>=0.0.48",
]

[tool.ruff.lint]
select = [
  "F",
  "E",
  "I",
  "N",
  "D",
  "UP",
  "B",
  "S",
  "C4",
  "SIM",
  "ASYNC",
  "FBT",
  "ERA",
  "T20",
  "RET",
  "PTH",
  "FLY",
  "PERF",
  "FURB",
  "TRY",
  "FAST",
  "LOG",
  "G",
  "INP",
  "PIE",
  "TD",
  "PD",
]
ignore = ["D107", "D203", "D212", "D415", "B008"]


[tool.ruff.lint.per-file-ignores]
"tests/**" = [
  "S101",
  "S105",
  "S106",
  "D",
]

[tool.ty.environment]
python-version = "3.11"

[tool.ty.rules]
all = "error"

[tool.commitizen]
name = "cz_conventional_commits"
version_provider = "pep621"
tag_format = "v$version"
update_changelog_on_bump = true
