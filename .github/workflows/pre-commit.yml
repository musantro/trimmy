name: Pre-commit

# Runs the project's prek (pre-commit) hooks in CI, so a contributor who
# bypasses the local hook can't slip unformatted or unlinted code past review.
# The commitizen hook is scoped to the commit-msg stage and is therefore
# skipped by `prek run --all-files`.

on:
  pull_request:
    branches: [master]

permissions: {}

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version-file: ".python-version"
      - run: uv sync --locked
      - name: Run prek hooks
        run: uv run prek run --all-files --show-diff-on-failure
