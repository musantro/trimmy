name: Pre-commit

# Runs the project's prek hooks in CI, so a contributor who bypasses the
# local hooks can't slip unformatted, unlinted, or invalid commit messages
# past review.

on:
  pull_request:
    branches: [master]

permissions: {}

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version-file: ".python-version"
      - run: uv sync --locked
      - name: Run prek hooks
        run: uv run prek run --all-files --show-diff-on-failure
      - name: Check commit messages
        run: uv run cz check --rev-range "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
