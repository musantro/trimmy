name: Bump & Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Bump version
        id: bump
        run: |
          # --changelog-to-stdout writes only the new version's changelog
          # section to stdout, which we keep as the GitHub Release notes.
          if uvx --from commitizen cz bump --yes --changelog --changelog-to-stdout --git-output-to-stderr > release-notes.md; then
            echo "bumped=true" >> $GITHUB_OUTPUT
            echo "version=$(uvx --from commitizen cz version --project)" >> $GITHUB_OUTPUT
          else
            rc=$?
            if [ $rc -eq 21 ]; then
              echo "No version bump needed"
              echo "bumped=false" >> $GITHUB_OUTPUT
            else
              exit $rc
            fi
          fi

      - name: Sync lockfile into bump commit
        if: steps.bump.outputs.bumped == 'true'
        run: |
          # cz bump updates pyproject.toml but not uv.lock, so the lockfile's
          # project version drifts. Regenerate it and fold it into the bump
          # commit (and move the tag) before anything is pushed, keeping the
          # tagged tree self-consistent.
          uv lock
          if ! git diff --quiet uv.lock; then
            git add uv.lock
            git commit --amend --no-edit
            git tag -f "v${{ steps.bump.outputs.version }}"
          fi

      - name: Push bump commit and tag
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git push
          git push --tags

      - name: Build package
        if: steps.bump.outputs.bumped == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.bump.outputs.bumped == 'true'
        run: uv publish

      - name: Create GitHub Release
        if: steps.bump.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --notes-file release-notes.md \
            dist/*
