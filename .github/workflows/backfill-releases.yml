name: Backfill Releases

# One-off helper: creates GitHub Releases for tags that predate the
# release automation, using each version's section from CHANGELOG.md.
# Removed once the back-fill has run.

on:
  push:
    branches: [claude/admiring-turing-edm36a]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create releases for existing tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for tag in $(git tag -l 'v*' | sort -V); do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Release $tag already exists, skipping"
              continue
            fi
            version="${tag#v}"
            awk -v ver="$version" '
              $0 ~ "^## v" ver " " {capture=1; next}
              capture && /^## v/ {exit}
              capture {print}
            ' CHANGELOG.md > notes.md
            if [ ! -s notes.md ]; then
              echo "Release $tag" > notes.md
            fi
            echo "Creating release $tag"
            gh release create "$tag" --title "$tag" --notes-file notes.md --verify-tag
          done
